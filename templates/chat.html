<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — NeedBro</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--blue:#1A6BFF;--navy:#0A1628;--sky:#EBF2FF;--amber:#FF8C00;--green:#12B76A;--gray-1:#F8FAFF;--gray-2:#E8EDF7;--gray-5:#6B7280;--gray-9:#111827;--white:#FFFFFF}
    body{font-family:'Inter',sans-serif;height:100vh;display:flex;flex-direction:column;background:var(--gray-1);overflow:hidden}
    /* Header */
    .chat-header{background:var(--white);border-bottom:1px solid var(--gray-2);padding:0 20px;height:60px;display:flex;align-items:center;gap:14px;flex-shrink:0}
    .back-btn{color:var(--gray-5);text-decoration:none;font-size:.88rem;font-weight:500}
    .back-btn:hover{color:var(--blue)}
    .chat-avatar{width:40px;height:40px;border-radius:50%;background:var(--blue);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;font-family:'Sora',sans-serif}
    .chat-info{flex:1}
    .chat-name{font-weight:700;font-size:.95rem}
    .chat-status{font-size:.75rem;color:var(--green);margin-top:1px}
    .header-actions{display:flex;gap:8px}
    .icon-btn{background:var(--gray-1);border:1.5px solid var(--gray-2);border-radius:8px;padding:7px 10px;cursor:pointer;font-size:1rem;transition:all .2s}
    .icon-btn:hover{border-color:var(--blue);background:var(--sky)}
    /* Messages area */
    .messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
    /* Date separator */
    .date-sep{text-align:center;position:relative;margin:8px 0}
    .date-sep span{background:var(--gray-2);color:var(--gray-5);font-size:.72rem;font-weight:600;padding:4px 12px;border-radius:20px}
    /* Message bubbles */
    .msg-row{display:flex;align-items:flex-end;gap:8px}
    .msg-row.sent{flex-direction:row-reverse}
    .msg-avatar{width:28px;height:28px;border-radius:50%;background:var(--blue);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0}
    .msg-avatar.provider{background:var(--amber)}
    .bubble{max-width:65%;padding:10px 14px;border-radius:16px;font-size:.88rem;line-height:1.5;position:relative}
    .bubble.received{background:var(--white);color:var(--gray-9);border:1.5px solid var(--gray-2);border-bottom-left-radius:4px}
    .bubble.sent{background:var(--blue);color:var(--white);border-bottom-right-radius:4px}
    .msg-time{font-size:.68rem;opacity:.65;margin-top:4px;text-align:right}
    .msg-status{font-size:.65rem;opacity:.75;margin-top:2px}
    /* Image message */
    .bubble img{max-width:200px;border-radius:10px;display:block;margin-bottom:6px}
    /* System message */
    .system-msg{text-align:center;font-size:.75rem;color:var(--gray-5);padding:4px 0}
    /* Input bar */
    .chat-input{background:var(--white);border-top:1px solid var(--gray-2);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
    .attach-btn{background:none;border:none;cursor:pointer;font-size:1.3rem;color:var(--gray-5);padding:4px;transition:color .2s}
    .attach-btn:hover{color:var(--blue)}
    .msg-input{flex:1;border:1.5px solid var(--gray-2);border-radius:24px;padding:10px 16px;font-size:.9rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;background:var(--gray-1)}
    .msg-input:focus{border-color:var(--blue);background:var(--white)}
    .send-btn{width:42px;height:42px;border-radius:50%;background:var(--blue);color:var(--white);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all .2s;flex-shrink:0}
    .send-btn:hover{background:#0D4FCC;transform:scale(1.05)}
    .send-btn:disabled{background:var(--gray-2);cursor:not-allowed;transform:none}
    /* Booking context bar */
    .booking-context{background:var(--sky);border-bottom:1px solid #BFDBFE;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .booking-context-info{font-size:.8rem;color:var(--blue)}
    .booking-context-info strong{display:block;font-weight:700;font-size:.85rem}
    .track-btn{padding:6px 14px;background:var(--blue);color:var(--white);border:none;border-radius:7px;font-size:.78rem;font-weight:700;cursor:pointer}
    /* Typing indicator */
    .typing{display:none;align-items:flex-end;gap:8px;padding:0 0 4px}
    .typing.visible{display:flex}
    .typing-bubble{background:var(--white);border:1.5px solid var(--gray-2);border-radius:16px;border-bottom-left-radius:4px;padding:10px 14px;display:flex;gap:4px}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--gray-5);animation:bounce 1.2s infinite}
    .dot:nth-child(2){animation-delay:.2s}
    .dot:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
    .ws-status{font-size:.7rem;color:var(--green);background:#D1FAE5;padding:2px 8px;border-radius:10px}
    .ws-status.disconnected{color:var(--gray-5);background:var(--gray-2)}
  </style>
</head>
<body>

<!-- Header -->
<div class="chat-header">
  <a class="back-btn" id="backBtn" href="dashboard.html">←</a>
  <div class="chat-avatar" id="chatAvatar">R</div>
  <div class="chat-info">
    <div class="chat-name" id="chatName">Raj Kumar</div>
    <div class="chat-status" id="chatStatus">🟢 Online · Electrician</div>
  </div>
  <div class="header-actions">
    <span class="ws-status" id="wsStatus">●  Live</span>
    <button class="icon-btn" title="Call" onclick="showToast('Calling feature coming soon')">📞</button>
    <button class="icon-btn" title="View booking" onclick="showToast('Opening booking…')">📋</button>
  </div>
</div>

<!-- Booking context -->
<div class="booking-context">
  <div class="booking-context-info">
    <strong>Booking #<span id="ctxBookingId">—</span></strong>
    <span id="ctxDetails">Electrical · <span id="ctxDate">—</span></span>
  </div>
  <button class="track-btn" onclick="location.href='track.html'">📍 Track</button>
</div>

<!-- Messages -->
<div class="messages" id="messagesContainer">
  <div class="date-sep"><span>Today</span></div>
  <div class="system-msg">🔒 This chat is private and encrypted</div>
</div>

<!-- Typing indicator -->
<div class="typing" id="typingIndicator">
  <div class="msg-avatar provider">R</div>
  <div class="typing-bubble">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<!-- Input -->
<div class="chat-input">
  <button class="attach-btn" onclick="document.getElementById('photoInput').click()" title="Send photo">📎</button>
  <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="sendImage(this)" />
  <input class="msg-input" id="messageInput" type="text" placeholder="Type a message…"
    onkeydown="handleKey(event)" oninput="handleTyping()" />
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<script>
const urlParams = new URLSearchParams(location.search);
const bookingId  = urlParams.get('booking') || 1;
const senderType = localStorage.getItem('provider_token') ? 'provider' : 'user';
const senderId   = 1; // Would come from decoded JWT
const API = '';
const WS_URL = (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host;
const token = localStorage.getItem('token') || localStorage.getItem('provider_token');

let ws = null;
let typingTimeout;

// Update context bar
document.getElementById('ctxBookingId').textContent = bookingId;
document.getElementById('ctxDate').textContent = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'});

// Connect WebSocket
function connectWS() {
  try {
    ws = new WebSocket(`${WS_URL}/api/chat/ws/${bookingId}/${senderType}/${senderId}`);
    ws.onopen = () => { document.getElementById('wsStatus').textContent = '● Live'; document.getElementById('wsStatus').className = 'ws-status'; };
    ws.onmessage = e => {
      const msg = JSON.parse(e.data);
      if (msg.sender_id !== senderId || msg.sender_type !== senderType) {
        appendMessage(msg.content, 'received', msg.sent_at, msg.sender_type);
        hideTyping();
      }
    };
    ws.onclose = () => { document.getElementById('wsStatus').textContent = '● Offline'; document.getElementById('wsStatus').className = 'ws-status disconnected'; setTimeout(connectWS, 3000); };
    ws.onerror = () => ws.close();
  } catch {}
}

// Load existing messages
async function loadMessages() {
  try {
    const res = await fetch(API + `/api/chat/${bookingId}/messages`);
    if (!res.ok) return;
    const msgs = await res.json();
    msgs.forEach(m => {
      const side = (m.sender_type === senderType && m.sender_id === senderId) ? 'sent' : 'received';
      appendMessage(m.content, side, m.sent_at, m.sender_type, m.message_type);
    });
  } catch {
    // Demo messages
    appendMessage('Hi! I have received your booking for electrical work today at 10 AM.', 'received', new Date(Date.now()-300000).toISOString(), 'provider');
    appendMessage('Great! The problem is with the power socket in the bedroom — it sparks.', 'sent', new Date(Date.now()-240000).toISOString(), 'user');
    appendMessage('Understood. Please make sure power is switched off from the main board until I arrive. I\'ll bring the required tools.', 'received', new Date(Date.now()-180000).toISOString(), 'provider');
    appendMessage('Sure, done. Should I share my exact location?', 'sent', new Date(Date.now()-120000).toISOString(), 'user');
    appendMessage('Yes please, or just share the flat number when I reach the building 🙏', 'received', new Date(Date.now()-60000).toISOString(), 'provider');
  }
  scrollToBottom();
}

function appendMessage(text, side, timestamp, type='user', msgType='text') {
  const container = document.getElementById('messagesContainer');
  const time = new Date(timestamp).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  const initials = type === 'provider' ? 'R' : 'U';
  const avatarClass = type === 'provider' ? 'provider' : '';

  const row = document.createElement('div');
  row.className = `msg-row ${side}`;
  row.innerHTML = `
    <div class="msg-avatar ${avatarClass}">${side==='sent'?'You'[0]:initials}</div>
    <div class="bubble ${side}">
      ${msgType==='image' ? `<img src="${text}" alt="sent image"/>` : `<span>${escapeHtml(text)}</span>`}
      <div class="msg-time">${time}${side==='sent'?' ✓✓':''}</div>
    </div>`;
  container.appendChild(row);
  scrollToBottom();
}

function sendMessage() {
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  appendMessage(text, 'sent', new Date().toISOString(), senderType);

  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({type:'text', content:text}));
  }
}

function sendImage(input) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    appendMessage(e.target.result, 'sent', new Date().toISOString(), senderType, 'image');
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({type:'image', content:e.target.result}));
    }
  };
  reader.readAsDataURL(input.files[0]);
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function scrollToBottom() { const c = document.getElementById('messagesContainer'); c.scrollTop = c.scrollHeight; }
function escapeHtml(text) { return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function handleTyping() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({type:'typing', content:'typing'}));
  }
}

function hideTyping() { document.getElementById('typingIndicator').classList.remove('visible'); }

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText='position:fixed;bottom:80px;right:20px;background:#0A1628;color:white;padding:10px 16px;border-radius:8px;font-size:.85rem;z-index:999;font-family:Inter,sans-serif';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

// Quick reply suggestions
const quickReplies = ['On my way 🚗','Reached 📍','Job completed ✅','Payment received 💰'];
const suggestEl = document.createElement('div');
suggestEl.style.cssText='display:flex;gap:6px;padding:6px 16px 0;flex-wrap:wrap;background:white;border-top:1px solid var(--gray-2);flex-shrink:0';
if (senderType==='provider') {
  quickReplies.forEach(r => {
    const btn = document.createElement('button');
    btn.textContent = r;
    btn.style.cssText='padding:5px 12px;border-radius:20px;font-size:.75rem;font-weight:600;cursor:pointer;border:1.5px solid #E8EDF7;background:#F8FAFF;color:#374151;transition:all .2s;font-family:Inter,sans-serif';
    btn.onclick = () => { document.getElementById('messageInput').value = r; sendMessage(); };
    suggestEl.appendChild(btn);
  });
  document.querySelector('.chat-input').before(suggestEl);
}

connectWS();
loadMessages();
</script>
</body>
</html>
