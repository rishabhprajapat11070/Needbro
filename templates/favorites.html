<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Favorites — NeedBro</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--blue:#1A6BFF;--navy:#0A1628;--sky:#EBF2FF;--amber:#FF8C00;--green:#12B76A;--red:#F04438;--gray-1:#F8FAFF;--gray-2:#E8EDF7;--gray-5:#6B7280;--gray-9:#111827;--white:#FFFFFF;--shadow:0 4px 24px rgba(26,107,255,.12);--radius:14px}
    body{font-family:'Inter',sans-serif;color:var(--gray-9);background:var(--gray-1);display:flex;min-height:100vh}
    .sidebar{width:240px;background:var(--navy);min-height:100vh;padding:24px 16px;flex-shrink:0;position:sticky;top:0}
    .sidebar-logo{font-family:'Sora',sans-serif;font-size:1.3rem;font-weight:800;color:var(--white);margin-bottom:32px;padding:0 8px}
    .sidebar-logo span{color:#FF8C00}
    .sidebar-nav{list-style:none;display:flex;flex-direction:column;gap:4px}
    .sidebar-nav li a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;text-decoration:none;color:#7A9CC4;font-size:.88rem;font-weight:500;transition:all .2s}
    .sidebar-nav li a:hover,.sidebar-nav li.active a{background:rgba(26,107,255,.15);color:var(--white)}
    .sidebar-nav li.active a{background:var(--blue);color:var(--white)}
    .sidebar-icon{font-size:1rem;width:20px;text-align:center}
    .sidebar-bottom{margin-top:auto;padding-top:24px;border-top:1px solid rgba(255,255,255,.08)}
    .main{flex:1;padding:32px;overflow-y:auto}
    .page-header{margin-bottom:24px}
    .page-header h1{font-family:'Sora',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:4px}
    .page-header p{color:var(--gray-5);font-size:.9rem}
    .fav-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
    .fav-card{background:var(--white);border:1.5px solid var(--gray-2);border-radius:var(--radius);padding:20px;position:relative;cursor:pointer;transition:all .2s}
    .fav-card:hover{border-color:var(--blue);box-shadow:var(--shadow);transform:translateY(-2px)}
    .remove-fav{position:absolute;top:14px;right:14px;background:#FEE2E2;color:var(--red);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:2}
    .remove-fav:hover{background:#FECACA;transform:scale(1.1)}
    .fav-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
    .fav-avatar{width:56px;height:56px;border-radius:50%;background:var(--sky);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
    .fav-name{font-weight:700;font-size:1rem;margin-bottom:3px}
    .fav-role{font-size:.8rem;color:var(--gray-5)}
    .verified-badge{background:#D1FAE5;color:#065F46;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;margin-top:5px}
    .fav-rating{display:flex;align-items:center;gap:6px;margin-bottom:12px}
    .stars{color:var(--amber);font-size:.9rem}
    .rating-num{font-weight:600;font-size:.85rem}
    .rating-count{color:var(--gray-5);font-size:.8rem}
    .fav-meta{display:flex;gap:14px;margin-bottom:14px}
    .meta-item{font-size:.78rem;color:var(--gray-5)}
    .meta-item strong{color:var(--gray-9)}
    .fav-actions{display:flex;gap:8px}
    .book-btn{flex:1;padding:9px;background:var(--blue);color:var(--white);border:none;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer}
    .book-btn:hover{background:#0D4FCC}
    .chat-icon-btn{padding:9px 14px;background:var(--sky);color:var(--blue);border:none;border-radius:8px;font-size:.9rem;cursor:pointer}
    .empty-state{text-align:center;padding:70px 20px;background:var(--white);border-radius:14px;border:1.5px solid var(--gray-2)}
    .empty-state .emoji{font-size:4rem;margin-bottom:16px}
    .empty-state h3{font-family:'Sora',sans-serif;font-size:1.2rem;margin-bottom:8px}
    .empty-state p{color:var(--gray-5);font-size:.9rem;margin-bottom:22px}
    .browse-btn{padding:11px 26px;background:var(--blue);color:var(--white);border:none;border-radius:10px;font-size:.88rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}
    @media(max-width:900px){.sidebar{display:none}.main{padding:18px}}
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">Need<span>Bro</span></div>
  <ul class="sidebar-nav">
    <li><a href="/dashboard"><span class="sidebar-icon">🏠</span>Dashboard</a></li>
    <li><a href="/search"><span class="sidebar-icon">🔍</span>Find Service</a></li>
    <li><a href="/booking"><span class="sidebar-icon">📋</span>My Bookings</a></li>
    <li class="active"><a href="/favorites"><span class="sidebar-icon">❤️</span>Favorites</a></li>
    <li><a href="/chat"><span class="sidebar-icon">💬</span>Messages</a></li>
    <li><a href="/profile"><span class="sidebar-icon">👤</span>Profile</a></li>
    <div class="sidebar-bottom">
      <li><a href="/" onclick="logout()"><span class="sidebar-icon">🚪</span>Sign Out</a></li>
    </div>
  </ul>
</aside>

<main class="main">
  <div class="page-header">
    <h1>My Favorites</h1>
    <p>Your saved professionals for quick rebooking</p>
  </div>

  <div class="fav-grid" id="favGrid">
    <div style="text-align:center;padding:40px;color:var(--gray-5);grid-column:1/-1">⏳ Loading favorites…</div>
  </div>
</main>

<script>
const API = '';
const token = localStorage.getItem('token');
if (!token) location.href = '/';

async function apiFetch(path, opts={}) {
  return fetch(API + path, {
    ...opts,
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers||{}) }
  });
}

const SAMPLE_FAVS = [
  {provider_id:1,name:'Raj Kumar',role:'Electrician',avg_rating:4.9,total_jobs:312,is_verified:true,emoji:'👨‍🔧'},
  {provider_id:2,name:'Mohan Singh',role:'AC Technician',avg_rating:4.8,total_jobs:198,is_verified:true,emoji:'🧑‍🔧'},
  {provider_id:3,name:'Sunita Devi',role:'Home Cleaner',avg_rating:4.7,total_jobs:421,is_verified:true,emoji:'👩'},
];

async function loadFavorites() {
  let favs = [];
  try {
    const res = await apiFetch('/api/favorites');
    if (!res.ok) throw new Error();
    favs = await res.json();
  } catch {
    favs = SAMPLE_FAVS;
  }
  render(favs);
}

function render(favs) {
  if (!favs.length) {
    document.getElementById('favGrid').innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="emoji">❤️</div>
        <h3>No favorites yet</h3>
        <p>Save your favorite professionals for quick rebooking next time.</p>
        <a href="/search" class="browse-btn">Browse Professionals</a>
      </div>`;
    return;
  }

  document.getElementById('favGrid').innerHTML = favs.map(f => `
    <div class="fav-card" onclick="location.href='/provider?id=${f.provider_id}'">
      <button class="remove-fav" onclick="event.stopPropagation();removeFavorite(${f.provider_id})" title="Remove from favorites">✕</button>
      <div class="fav-top">
        <div class="fav-avatar">${f.emoji || '👨‍🔧'}</div>
        <div>
          <div class="fav-name">${f.name}</div>
          <div class="fav-role">${f.role || 'Service Professional'}</div>
          ${f.is_verified ? '<span class="verified-badge">✓ Verified</span>' : ''}
        </div>
      </div>
      <div class="fav-rating">
        <span class="stars">★★★★★</span>
        <span class="rating-num">${f.avg_rating}</span>
        <span class="rating-count">(${f.total_jobs} jobs)</span>
      </div>
      <div class="fav-meta">
        <div class="meta-item">🛠️ <strong>${f.total_jobs}</strong> jobs done</div>
      </div>
      <div class="fav-actions">
        <button class="book-btn" onclick="event.stopPropagation();bookNow(${f.provider_id})">Book Again</button>
        <button class="chat-icon-btn" onclick="event.stopPropagation();location.href='/chat?provider=${f.provider_id}'">💬</button>
      </div>
    </div>`).join('');
}

async function removeFavorite(providerId) {
  try {
    await apiFetch(`/api/favorites/${providerId}`, {method:'POST'});
  } catch {}
  loadFavorites();
  showToast('Removed from favorites');
}

function bookNow(providerId) { location.href = `/booking?provider_id=${providerId}`; }
function logout() { localStorage.clear(); }

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText='position:fixed;bottom:24px;right:24px;background:#0A1628;color:white;padding:12px 18px;border-radius:10px;font-size:.88rem;z-index:999;font-family:Inter,sans-serif';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

loadFavorites();
</script>
</body>
</html>
